app = "schengen-visa-tracker"
primary_region = "iad"

[build]

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.healthz]
      grace_period = "15s"
      interval = "30s"
      method = "GET"
      timeout = "5s"
      path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
